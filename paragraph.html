<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paragraph</title>

    <style>
      body {
        background-color: bisque;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      h1,
      p {
        text-align: center;
        background-color: orangered;
        color: white;
      }

      h2 {
        color: orangered;
      }

      pre {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <!-- resto -->
    <h1>
      mie ayam <br />
      awokawok
    </h1>

    <!-- menu -->
    <h2>makanan</h2>
    <pre>
        mie ayam    : (7k)
        mie pangsit : (7k)
        mie sambel  : (8k)
     </pre
    >
    <hr />

    <h2>minuman</h2>
    <pre>
        teh melati   : (3k)
        teh kunyit   : (3k)
        teh kurma    : (3k)
        susu vanila  : (3k)
        susu coklat  : (3k)
     </pre
    >
    <hr />

    <!-- penutup -->
    <p>selamat menikmat</p>
  </body>
</html>
